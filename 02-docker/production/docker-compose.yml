services:

  # ──────────────────────────────────────
  # Agent Service
  # ──────────────────────────────────────
  agent:
    build:
      context: ../..
      dockerfile: 02-docker/production/Dockerfile
      target: runtime
    environment:
      ENVIRONMENT: staging
      PORT: 8000
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
    # ❗ nếu chưa có file này thì COMMENT lại
    # env_file:
    #   - .env.local

    depends_on:
      - redis
      - qdrant

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    restart: unless-stopped
    networks:
      - internal


  # ──────────────────────────────────────
  # Redis
  # ──────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - internal


  # ──────────────────────────────────────
  # Qdrant
  # ──────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.9.0
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - internal


  # ──────────────────────────────────────
  # Nginx
  # ──────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - agent
    restart: unless-stopped
    networks:
      - internal


# ──────────────────────────────────────
# Volumes
# ──────────────────────────────────────
volumes:
  redis_data:
  qdrant_data:


# ──────────────────────────────────────
# Network
# ──────────────────────────────────────
networks:
  internal:
    driver: bridge